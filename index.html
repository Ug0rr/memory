<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gioco Memory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Gioco Memory</h1>

    <!-- SCHERMATA INIZIALE -->
    <div id="start-screen">
        <p>Inserisci il tuo nome per iniziare:</p>
        <input type="text" id="nome-giocatore" placeholder="Il tuo nome...">
        <button id="btn-inizia">Inizia a Giocare!</button>
    </div>

    <!-- INFO GIOCO (Nascoste all'inizio) -->
    <div id="game-info" class="hidden">
        <h2 id="saluto-giocatore"></h2>
        <p>Tentativi: <span id="contatore-tentativi">0</span></p>
    </div>
    
    <!-- IL TAVOLO DA GIOCO (Nascosto all'inizio) -->
    <div id="game-board" class="board hidden"></div>

    <!-- SCHERMATA FINALE (Nascosta all'inizio) -->
    <div id="end-screen" class="hidden">
        <h2 id="messaggio-fine"></h2>
        <button id="btn-rigioca">Ricomincia da capo</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
